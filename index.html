        //按钮


        //鼠标跟随
        var backcur = document.getElementById("backcur")
        var pixaldata = [] //定义数组存放每个span的信息
        var pixallife = 50 //设置生命周期

        window.addEventListener("mousemove", function(evt) {
            var span = document.createElement("span") //新建粒子span
            span.className = "pixal" //使用pixal作为class设置
            backcur.appendChild(span) //将span作为子元素添加至#back层
            pixaldata.push({ //插入span信息
                time: 0, //初始时间
                color: "rgba(" + parseInt(Math.random() * 255) + "," + parseInt(Math.random() * 255) + "," + parseInt(Math.random() * 255) + "," + parseInt(Math.random() * 255) + ")", //粒子颜色
                vx: Math.random() * 0.4, //x轴位移速度
                vy: Math.random() * 0.4, //y轴位移速度
                sx: evt.x, //根据鼠标坐标设置粒子的起始坐标
                sy: evt.y
            });
        });

        function draw() {
            for (var i = 0; i < pixaldata.length; i++) {
                pixal = pixaldata[i] //指定粒子属性
                children = backcur.children[i] //指定当前子元素
                pixal.time++ //增加时间
                    pixal.sx += pixal.vx * 2 //设置位移距离
                pixal.sy += pixal.vy * 2
                children.style.background = pixal.color //设置背景颜色
                children.style.left = pixal.sx + "px" //根据位移值设置坐标
                children.style.top = pixal.sy + "px"
                if (pixal.time >= pixallife) {
                    pixaldata.splice(i, 1); //删除数组元素
                    backcur.removeChild(backcur.childNodes[i]); //删除子元素
                };
            };
        };
        setInterval(draw, 1);
    </script>
    <style>

            left: -5px;
            top: -5px;
            width: 4px;
            height: 4px;
            background: white;
